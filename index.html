<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hitrekk — 3D Hiking Explorer</title>

  <!-- MapLibre GL CSS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">

  <!-- App styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/app.css">

  <!-- CDN scripts (UMD globals, loaded before our ES modules) -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">

    <div class="sidebar-header">
      <div class="logo-row">
        <button id="mob-close" aria-label="Close menu" style="display:none">&#x2715;</button>

        <svg class="logo-svg" width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <path d="M2 22L10 8L16 16L20 11L26 22H2Z" fill="currentColor" opacity=".2"/>
          <path d="M2 22L10 8L16 16L20 11L26 22" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="23" cy="6" r="2.5" fill="currentColor" opacity=".6"/>
        </svg>

        <div>
          <h1>Hitrekk</h1>
          <p class="tagline">3D Hiking Explorer</p>
        </div>

        <button id="dash-btn" class="icon-btn" title="All-time stats" aria-label="Open stats dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
          </svg>
        </button>
      </div>

      <div class="user-row">
        <span id="user-name">&mdash;</span>
        <button id="logout-btn" class="btn-ghost-sm">Sign out</button>
      </div>
    </div>

    <!-- Dropzone -->
    <div id="dropzone" class="dropzone" role="region" aria-label="GPX file upload area">
      <input type="file" id="file-input" accept=".gpx" multiple aria-label="Choose GPX files">
      <svg class="drop-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <polyline points="16 16 12 12 8 16"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      <p class="drop-title">Drop GPX files here</p>
      <p class="drop-sub">or click to browse &mdash; multiple files supported</p>
    </div>

    <!-- Map layers -->
    <div class="sidebar-section">
      <div class="section-title">Map Layers</div>
      <label class="toggle-row">
        <span>OSM Hiking Trails</span>
        <input type="checkbox" id="hiking-layer-toggle" role="switch" aria-label="Toggle OSM hiking trails overlay">
      </label>
    </div>

    <!-- Routes -->
    <div class="sidebar-section" style="border-bottom: none;">
      <div class="section-title">
        Routes
        <button id="clear-all-btn" class="btn-ghost-sm">Clear all</button>
      </div>
      <div id="route-list" aria-label="Loaded routes"></div>
      <div id="route-list-empty" class="list-empty">
        No routes loaded yet.<br>Drop a .gpx file to begin.
      </div>
    </div>

    <!-- Active route stats (populated by ui.js) -->
    <div id="route-stats-panel" class="sidebar-section" style="display: none; border-top: 1px solid var(--border);">
    </div>

  </aside>

  <!-- Map -->
  <main id="map-container">
    <div id="map" role="application" aria-label="3D hiking map"></div>

    <!-- Drop overlay -->
    <div id="drop-overlay" class="hidden" aria-hidden="true">
      <div class="overlay-box">
        <svg class="overlay-icon" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        <h2>Drop GPX File</h2>
        <p>Release to load your hiking route</p>
      </div>
    </div>
  </main>
</div>

<!-- Elevation panel (fixed, outside grid) -->
<div id="elev-panel" class="hidden" aria-label="Elevation profile">
  <div class="panel-header">
    <span>Elevation Profile</span>
    <button id="elev-close" class="btn-ghost-sm" aria-label="Close elevation panel">&#x2715;</button>
  </div>
  <div id="elev-chart-container">
    <canvas id="elev-chart" role="img" aria-label="Elevation profile chart"></canvas>
  </div>
</div>

<!-- Dashboard modal -->
<div id="dash-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="All-time statistics">
  <div class="modal-box">
    <div class="modal-hdr">
      <h2>All-Time Stats</h2>
      <span id="dash-hike-badge" class="hike-badge"></span>
      <div class="modal-hdr-right">
        <button id="dash-close" class="modal-close" aria-label="Close dashboard">&#x2715;</button>
      </div>
    </div>
    <div id="dash-body" class="modal-body"></div>
  </div>
</div>

<!-- Mobile FAB -->
<button id="mob-open" aria-label="Open menu">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<!-- Toast notifications -->
<div id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

<!-- Main ES module entry point -->
<script type="module" src="js/app.js"></script>

</body>
</html>
